[global]
src_root = ".."
build_root = "../_build_py"
# Optional base prefix for Unix. If unset, defaults to ./_install/UBS under repo.
prefix_base = "../_install/UBS"
# Build types can be narrowed via --build-types Debug,Release
build_types = ["Debug", "Release", "ASAN"]
# Global language and toolchain policy
cxx_standard = 20
cxx_extensions = false
use_libcxx = true
use_lld = true
static_default = true
pic = true
# jobs = 0 means auto
jobs = 0
# Unix suffixes for Debug/ASAN prefixes
debug_suffix = "d"
asan_suffix = "asn"

# Group toggles (match shell script defaults)
build_gl_stack = true
build_imageio_stack = true
build_exr_stack = true
build_gtest = false
build_libjxl = true
build_libuhdr = true
build_ocio = true
build_libraw = true
build_libheif = true
build_aom = true
build_libde265 = true
build_x265 = true
build_kvazaar = true
build_webp = true
build_ptex = true
build_pybind11 = true
build_oiio = true
openimageio_patch_png_include = true

# Repo-specific switches (match shell script defaults)
openjpeg_build_codec = ""
ocio_build_apps = "OFF"
libjxl_enable_tools = "ON"
libraw_enable_examples = "ON"
libraw_enable_openmp = "ON"
xz_use_autotools = false
lcms2_use_autotools = false
no_update = true

# Optional toolchain overrides
# cc = "clang"
# cxx = "clang++"
# ld = "ld.lld"
# ar = "llvm-ar"
# ranlib = "llvm-ranlib"

# Extra env vars passed to all build commands
[global.env]
# Example: OpenMP_ROOT = "/opt/homebrew/opt/libomp"

[windows]
# generator: msvc, ninja-msvc, msvc-clang-cl, ninja-clang-cl
# generator = "ninja-clang-cl"
# install_prefix = "E:\\DVS"
# asan_prefix = "E:\\DVS_ASAN"
# debug_postfix = "d"

