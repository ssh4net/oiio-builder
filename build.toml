dir = "openssl"
# Windows-only: imported from a vcpkg export zip placed under `external/`.
# Default expected path: `external/vcpkg-export-openssl.zip`
# Override: set `OPENSSL_VCPKG_EXPORT_ZIP` in `[windows.env]` or the process env.
url = ""
build_system = "openssl"

[[repos]]
name = "Qt6"
dir = "Qt6"
