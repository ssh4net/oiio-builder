[global]
src_root = "./developer"
build_root = "./developer/_build"
# Prefix layout:
# - suffix (legacy): Release=<prefix_base>, Debug=<prefix_base><debug_suffix>, ASAN=<prefix_base><asan_suffix>
# - by-build-type: Release=<prefix_base>/Release, Debug=<prefix_base>/Debug, ASAN=<prefix_base>/ASAN
prefix_layout = "by-build-type"
prefix_base = "./developer/install"
# Optional explicit install prefixes (primarily for Windows):
# install_prefix = "./developer/install"
# asan_prefix = "./developer/asan"
# Build types can be narrowed via --build-types Debug,Release
# build_types = ["Debug", "Release", "ASAN"]
build_types = ["Debug", "Release"]

# Preferred order when multiple repos are ready to build (does not override deps).
preferred_repo_order = [
  "googletest",
  "fmt",
  "spdlog",
  "zlib-ng",
  "libdeflate",
  "xz",
  "zstd",
  "bzip2",
  "brotli",
  "pugixml",
  "nativefiledialog-extended",
  "libjpeg-turbo",
  "glfw",
  "glew",
  "freeglut",
  "giflib",
  "jasper",
  "expat",
  "yaml-cpp",
  "harfbuzz",
  "robinmap",
  "eigen",
  "LBFGSpp",
  "imath",
  "pystring",
  "nanobind",
  "pybind11",
  "lcms2",
  "aom",
  "libde265",
  "x265",
  "kvazaar",
  "libwebp",
  "LibRaw",
]
# Global language and toolchain policy
cxx_standard = 20
cxx_extensions = false
# use_libcxx = false in case of CUDA
use_libcxx = true
use_lld = true
static_default = true
pic = true
# jobs = 0 means auto
jobs = 0
# Unix suffixes for Debug/ASAN prefixes (used only when prefix_layout="suffix")
debug_suffix = "d"
asan_suffix = "asn"

# Group toggles (match shell script defaults)
build_gl_stack = true
build_imageio_stack = true
build_exr_stack = true
build_gtest = true
build_libjxl = true
build_libuhdr = true
build_ocio = true
build_libraw = true
build_libheif = true
build_aom = true
build_libde265 = true
build_x265 = true
build_kvazaar = true
build_webp = true
build_ptex = true
build_pybind11 = true
build_ffmpeg = true
build_oiio = true
build_qt6 = false
build_dng_sdk = false
openimageio_patch_png_include = true

# Repo-specific switches (match shell script defaults)
openjpeg_build_codec = ""
ocio_build_apps = "OFF"
libjxl_enable_tools = "ON"
libraw_enable_examples = "ON"
libraw_enable_openmp = "ON"
xz_use_autotools = false
lcms2_use_autotools = false
no_update = true

# Optional toolchain overrides
# cc = "clang"
# cxx = "clang++"
# ld = "ld.lld"
# ar = "llvm-ar"
# ranlib = "llvm-ranlib"

# Extra env vars passed to all build commands
[global.env]
# Example: OpenMP_ROOT = "/opt/homebrew/opt/libomp"

[windows]
# generator: msvc, ninja-msvc, msvc-clang-cl, ninja-clang-cl
# generator = "ninja-clang-cl"
# Visual Studio generator override (e.g. for VS 2026 with CMake 4.2+):
# vs_generator = "Visual Studio 18 2026"
# clang-cl (x86_64): extra compiler flags to apply globally when using a clang-cl generator.
# - `clangcl_extra_flags` overrides the baseline (default if unset: "-msse4.1")
# - `clangcl_extra_flags_append` appends extra flags (default: "")
# Example: enable AVX2 + required sub-features:
# clangcl_extra_flags_append = "-mavx2 -mbmi -mbmi2 -mlzcnt"
install_prefix = "./developer/install"
asan_prefix = "./developer/asan"
# debug_postfix = "d"
build_ffmpeg = false  # default OFF on Windows; when ON, MSYS2 shells source-build FFmpeg, otherwise prebuilt FFmpeg is expected
# msvc_runtime: static|dynamic (default: static => /MT, /MTd)
# msvc_runtime = "static"
# python_wrappers: auto|on|off (default: auto)
#   auto -> ON only when msvc_runtime=dynamic
#   on   -> force ON for OpenColorIO/OpenEXR wrappers
#   off  -> force OFF for OpenColorIO/OpenEXR wrappers
# python_wrappers = "auto"

[windows.env]
# OpenMP (libomp) for clang-cl builds (e.g. when libraw_enable_openmp="ON"):
# OpenMP_ROOT = "C:/LLVM"
# FFmpeg on Windows:
# - The builder does not build FFmpeg natively on Windows.
# - Install/copy an MSVC-built static FFmpeg into the same prefix used by this script
#   (the `install_prefix`/`prefix_base`), so headers are under `<prefix>/include`
#   and libs are under `<prefix>/lib`.
# Optional explicit overrides (should still point inside the same `<prefix>`):
# FFMPEG_LIBAVCODEC = "<prefix>/lib/avcodecd.lib"
# FFMPEG_LIBAVFORMAT = "<prefix>/lib/avformatd.lib"
# FFMPEG_LIBAVUTIL = "<prefix>/lib/avutild.lib"
# FFMPEG_LIBSWSCALE = "<prefix>/lib/swscaled.lib"
# PKG_CONFIG_EXECUTABLE = "C:/VCPKG/installed/x64-windows/tools/pkgconf/pkgconf.exe"
# DOXYGEN_EXECUTABLE    = "C:/Program Files/doxygen/bin/doxygen.exe"

[[repos]]
name = "zlib-ng"
dir = "zlib-ng"
url = "https://github.com/zlib-ng/zlib-ng.git"
build_system = "cmake"

