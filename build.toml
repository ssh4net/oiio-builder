ref = "v6.9.2"
ref_type = "tag"
build_system = "qt6"
deps = ["pcre2", "zlib-ng", "libpng", "libjpeg-turbo", "libtiff", "libwebp", "freetype", "harfbuzz", "ffmpeg", "openssl"]

